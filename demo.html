<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --info: #17a2b8;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --purple: #9b59b6;
            --java-blue: #007396;
            --java-orange: #f89820;
            --gold: #f1c40f;
            --list-color: #3498db;
            --array-color: #e67e22;
            --linked-color: #27ae60;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Hiệu ứng nền động */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            pointer-events: none;
            z-index: 0;
            animation: gradientShift 18s ease infinite;
        }

        @keyframes gradientShift {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.02);
            }
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 45px;
            box-shadow: 0 45px 90px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: floatContainer 12s ease-in-out infinite;
        }

        @keyframes floatContainer {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            25% {
                transform: translateY(-4px) rotate(0.1deg);
            }

            75% {
                transform: translateY(4px) rotate(-0.1deg);
            }
        }

        header {
            background: linear-gradient(135deg, var(--java-blue), #005a8c, var(--java-orange), #e67e22);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 5px solid var(--gold);
        }

        header::before {
            content: '📚🗂️📋📊';
            position: absolute;
            font-size: 200px;
            opacity: 0.08;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            animation: spinSlow 35s linear infinite;
            white-space: nowrap;
        }

        header::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,
                    transparent 30%,
                    rgba(255, 255, 255, 0.15) 50%,
                    transparent 70%);
            animation: shine 12s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        @keyframes spinSlow {
            from {
                transform: translateY(-50%) rotate(0deg);
            }

            to {
                transform: translateY(-50%) rotate(360deg);
            }
        }

        header h1 {
            font-size: 3.3rem;
            margin-bottom: 15px;
            animation: slideInDown 1s ease;
            /* text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5); */
            background: linear-gradient(45deg, #fff, #f0f0f0, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 2;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-70px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 340px 1fr;
            min-height: 80vh;
        }

        .sidebar {
            background: linear-gradient(135deg, var(--light), #ffffff, #f8f9fa);
            padding: 25px;
            border-right: 4px solid var(--java-orange);
            box-shadow: 8px 0 25px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .sidebar::after {
            content: '🗂️📋';
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 80px;
            opacity: 0.1;
            transform: rotate(10deg);
        }

        .nav-list {
            list-style: none;
            position: sticky;
            top: 20px;
        }

        .nav-item {
            margin-bottom: 12px;
            animation: slideInLeft 0.7s ease;
            animation-fill-mode: both;
            perspective: 1000px;
        }

        .nav-item:nth-child(1) {
            animation-delay: 0.05s;
        }

        .nav-item:nth-child(2) {
            animation-delay: 0.1s;
        }

        .nav-item:nth-child(3) {
            animation-delay: 0.15s;
        }

        .nav-item:nth-child(4) {
            animation-delay: 0.2s;
        }

        .nav-item:nth-child(5) {
            animation-delay: 0.25s;
        }

        .nav-item:nth-child(6) {
            animation-delay: 0.3s;
        }

        .nav-item:nth-child(7) {
            animation-delay: 0.35s;
        }

        .nav-item:nth-child(8) {
            animation-delay: 0.4s;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px) rotateY(30deg);
            }

            to {
                opacity: 1;
                transform: translateX(0) rotateY(0);
            }
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px 22px;
            background: white;
            border-radius: 20px;
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            border: 2px solid transparent;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
            z-index: 1;
            font-size: 1.05rem;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(52, 152, 219, 0.15), transparent);
            transition: left 0.8s;
            z-index: -1;
        }

        .nav-link:hover::before {
            left: 100%;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--java-blue), var(--java-orange), var(--gold));
            transition: width 0.4s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link:hover,
        .nav-link.active {
            background: linear-gradient(135deg, var(--java-blue), #005a8c, var(--java-orange));
            color: white;
            transform: translateX(12px) scale(1.05) rotateY(2deg);
            border-color: var(--java-orange);
            box-shadow: 0 25px 45px rgba(0, 115, 150, 0.4);
        }

        .nav-link i {
            transition: transform 0.5s ease;
            font-size: 1.4rem;
        }

        .nav-link:hover i {
            transform: rotate(360deg) scale(1.4);
        }

        .nav-link span {
            position: relative;
            z-index: 2;
        }

        .main-content {
            padding: 40px;
            overflow-y: auto;
            max-height: 80vh;
            scroll-behavior: smooth;
        }

        .section {
            display: none;
            animation: fadeInScale 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.2);
        }

        .section.active {
            display: block;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.94) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        h2 {
            color: var(--primary);
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 6px solid var(--java-blue);
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 2.2rem;
            position: relative;
            /* text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05); */
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 120px;
            height: 6px;
            background: linear-gradient(90deg, var(--java-orange), var(--gold), var(--accent));
            animation: pulseWidthAdvanced 6s ease-in-out infinite;
            border-radius: 3px;
        }

        @keyframes pulseWidthAdvanced {

            0%,
            100% {
                width: 120px;
                opacity: 0.8;
            }

            50% {
                width: 280px;
                opacity: 1;
            }
        }

        h2 i {
            animation: bounceRotate 5s infinite;
            color: var(--java-orange);
        }

        @keyframes bounceRotate {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            25% {
                transform: translateY(-6px) rotate(12deg);
            }

            75% {
                transform: translateY(4px) rotate(-12deg);
            }
        }

        h3 {
            color: var(--accent);
            margin: 35px 0 20px;
            padding-left: 20px;
            border-left: 8px solid var(--java-blue);
            position: relative;
            transition: all 0.5s ease;
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--dark), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h3:hover {
            transform: scale(1.05) translateX(10px);
            border-left-width: 10px;
        }

        h4 {
            color: var(--info);
            margin: 28px 0 18px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .code-block {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 28px;
            border-radius: 24px;
            margin: 28px 0;
            overflow-x: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            line-height: 1.5;
            border: 2px solid #444;
            position: relative;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.2);
        }

        .code-block:hover {
            transform: scale(1.02) translateY(-8px);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.4);
            border-color: var(--java-orange);
        }

        .code-block::before {
            content: 'Java Collections';
            position: absolute;
            top: 15px;
            right: 80px;
            color: #888;
            font-size: 14px;
            opacity: 0.5;
            font-style: italic;
            font-weight: bold;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 1rem;
            border-bottom: 1px solid #444;
            padding-bottom: 12px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #555, #666);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            font-weight: 600;
        }

        .copy-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.7s, height 0.7s;
        }

        .copy-btn:hover::before {
            width: 180px;
            height: 180px;
        }

        .copy-btn:hover {
            background: linear-gradient(135deg, #666, #777);
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .keyword {
            color: #569cd6;
            animation: glow 5s ease-in-out infinite;
            font-weight: 600;
        }

        @keyframes glow {

            0%,
            100% {
                text-shadow: 0 0 2px #569cd6;
            }

            50% {
                /* text-shadow: 0 0 15px #569cd6, 0 0 25px #3498db; */
            }
        }

        .string {
            color: #ce9178;
        }

        .comment {
            color: #6a9955;
        }

        .number {
            color: #b5cea8;
        }

        .table-container {
            overflow-x: auto;
            margin: 30px 0;
            border-radius: 24px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        }

        th {
            background: linear-gradient(135deg, var(--java-blue), #005a8c, var(--java-orange), #e67e22);
            color: white;
            padding: 20px;
            text-align: left;
            font-weight: 700;
            position: relative;
            overflow: hidden;
            font-size: 1.2rem;
        }

        th::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg,
                    transparent 30%,
                    rgba(255, 255, 255, 0.25) 50%,
                    transparent 70%);
            animation: tableShineAdvanced 6s infinite;
        }

        @keyframes tableShineAdvanced {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        td {
            padding: 16px 22px;
            border-bottom: 1px solid #eee;
            transition: all 0.4s ease;
        }

        tr {
            transition: all 0.4s ease;
        }

        tr:hover td {
            background: rgba(52, 152, 219, 0.1);
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .note,
        .info-box,
        .warning-box,
        .success-box,
        .comparison-box {
            padding: 25px;
            margin: 30px 0;
            border-radius: 24px;
            animation: slideInRightAdvanced 0.8s ease;
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.1);
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .note:hover,
        .info-box:hover,
        .warning-box:hover,
        .success-box:hover,
        .comparison-box:hover {
            transform: translateX(12px) scale(1.03);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .note::after,
        .info-box::after,
        .warning-box::after,
        .success-box::after,
        .comparison-box::after {
            content: '';
            position: absolute;
            top: -15px;
            right: -15px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: bubble 7s infinite;
        }

        @keyframes bubble {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.3;
            }

            50% {
                transform: scale(1.8);
                opacity: 0.1;
            }
        }

        @keyframes slideInRightAdvanced {
            from {
                opacity: 0;
                transform: translateX(-50px) rotateY(15deg);
            }

            to {
                opacity: 1;
                transform: translateX(0) rotateY(0);
            }
        }

        .note {
            background: #fff3cd;
            border-left: 8px solid var(--warning);
        }

        .info-box {
            background: #d1ecf1;
            border-left: 8px solid var(--info);
        }

        .warning-box {
            background: #fff3cd;
            border-left: 8px solid var(--accent);
        }

        .success-box {
            background: #d4edda;
            border-left: 8px solid var(--success);
        }

        .comparison-box {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            border-left: 8px solid var(--purple);
            border-right: 8px solid var(--java-orange);
        }

        .demo-box {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            border: 2px solid #e9ecef;
            border-radius: 24px;
            padding: 35px;
            margin: 30px 0;
            text-align: center;
            transition: all 0.6s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.05);
        }

        .demo-box:hover {
            transform: scale(1.04) translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 30px 60px rgba(241, 196, 15, 0.25);
        }

        .demo-box::before {
            content: '📋🗂️📊';
            position: absolute;
            bottom: -30px;
            right: -30px;
            font-size: 180px;
            opacity: 0.04;
            transform: rotate(20deg);
        }

        .demo-box h3 {
            margin-top: 0;
            color: var(--primary);
        }

        .badge {
            display: inline-block;
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            margin: 5px;
            animation: badgePop 0.6s ease;
        }

        @keyframes badgePop {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        .badge-list {
            background: linear-gradient(135deg, var(--list-color), #2980b9);
            color: white;
        }

        .badge-array {
            background: linear-gradient(135deg, var(--array-color), #d35400);
            color: white;
        }

        .badge-linked {
            background: linear-gradient(135deg, var(--linked-color), #219a52);
            color: white;
        }

        .badge-gold {
            background: linear-gradient(135deg, var(--gold), #f39c12);
            color: white;
        }

        .big-o {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--light);
            display: inline-block;
        }

        .big-o-fast {
            background: #d4edda;
            color: #155724;
        }

        .big-o-slow {
            background: #f8d7da;
            color: #721c24;
        }

        .big-o-medium {
            background: #fff3cd;
            color: #856404;
        }

        footer {
            text-align: center;
            padding: 35px;
            background: linear-gradient(135deg, var(--java-blue), #005a8c, var(--dark));
            color: white;
            position: relative;
            overflow: hidden;
        }

        footer::before {
            content: '📚🗂️📋📊';
            position: absolute;
            left: 20px;
            bottom: 10px;
            font-size: 90px;
            opacity: 0.2;
            animation: spinSlow 30s linear infinite;
        }

        footer::after {
            content: 'Collections Framework & List';
            position: absolute;
            right: 20px;
            bottom: 15px;
            font-size: 55px;
            opacity: 0.1;
            font-weight: bold;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: none;
                border-bottom: 4px solid var(--java-orange);
            }

            header h1 {
                font-size: 2.2rem;
            }

            footer::after {
                font-size: 30px;
            }
        }

        /* Hiệu ứng cho các icon đặc biệt */
        .fa-layer-group {
            animation: layerPulse 4s infinite;
        }

        @keyframes layerPulse {

            0%,
            100% {
                color: var(--java-blue);
            }

            50% {
                color: var(--java-orange);
                transform: scale(1.2);
            }
        }

        .fa-list-ul {
            animation: listWiggle 3s infinite;
        }

        @keyframes listWiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(10deg);
            }

            75% {
                transform: rotate(-10deg);
            }
        }

        .fa-code-branch {
            animation: branchSpin 5s infinite;
        }

        @keyframes branchSpin {

            0%,
            100% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(180deg);
            }
        }

        .hierarchy {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 25px;
            border-radius: 24px;
            font-family: monospace;
            font-size: 1.1rem;
            line-height: 2;
            margin: 25px 0;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            animation: glowBorder 4s infinite;
        }

        @keyframes glowBorder {

            0%,
            100% {
                border-left: 8px solid var(--java-blue);
            }

            50% {
                border-left: 8px solid var(--java-orange);
            }
        }
    </style>
